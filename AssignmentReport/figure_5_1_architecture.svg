<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="860" height="460" viewBox="0 0 860 460"
     font-family="Arial, Helvetica, sans-serif">

  <rect width="860" height="460" fill="#ffffff"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#000000">
    Figure 5.1: System Component Architecture
  </text>

  <!-- ══════════════════════════════════════════════════════
       LAYER 1 — Presentation
  ══════════════════════════════════════════════════════ -->
  <rect x="20" y="48" width="820" height="80" rx="5" fill="#f7f7f7" stroke="#555" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="36" y="65" font-size="10" font-weight="bold" fill="#555">Presentation Layer</text>

  <!-- Next.js / Vercel -->
  <rect x="270" y="72" width="320" height="44" rx="4" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
  <text x="430" y="91" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">Next.js Frontend</text>
  <text x="430" y="107" text-anchor="middle" font-size="9" fill="#444">Vercel · TypeScript · Tailwind CSS · shadcn/ui · React Query</text>

  <!-- ══════════════════════════════════════════════════════
       LAYER 2 — API
  ══════════════════════════════════════════════════════ -->
  <rect x="20" y="148" width="820" height="80" rx="5" fill="#f7f7f7" stroke="#555" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="36" y="165" font-size="10" font-weight="bold" fill="#555">API Layer</text>

  <!-- FastAPI / Render -->
  <rect x="270" y="172" width="320" height="44" rx="4" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
  <text x="430" y="191" text-anchor="middle" font-size="12" font-weight="bold" fill="#000">FastAPI Backend</text>
  <text x="430" y="207" text-anchor="middle" font-size="9" fill="#444">Render · Pydantic v2 · SQLAlchemy 2 · JWT Auth · BackgroundTasks</text>

  <!-- HTTP arrow between layers 1 and 2 -->
  <line x1="430" y1="116" x2="430" y2="170" stroke="#333" stroke-width="1.5" marker-end="url(#arr2)" marker-start="url(#arrS)"/>
  <text x="448" y="147" font-size="9" fill="#555">HTTP / REST</text>

  <!-- ══════════════════════════════════════════════════════
       LAYER 3 — Data / Services (split into columns)
  ══════════════════════════════════════════════════════ -->
  <rect x="20" y="248" width="820" height="170" rx="5" fill="#f7f7f7" stroke="#555" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="36" y="265" font-size="10" font-weight="bold" fill="#555">Data &amp; External Services Layer</text>

  <!-- PostgreSQL / Supabase -->
  <rect x="40"  y="280" width="150" height="60" rx="4" fill="#d9d9d9" stroke="#333" stroke-width="1.5"/>
  <text x="115" y="304" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">PostgreSQL</text>
  <text x="115" y="320" text-anchor="middle" font-size="9" fill="#444">Supabase</text>
  <text x="115" y="334" text-anchor="middle" font-size="9" fill="#444">Books · Chapters · Segments</text>

  <!-- Redis / Upstash -->
  <rect x="210" y="280" width="150" height="60" rx="4" fill="#d9d9d9" stroke="#333" stroke-width="1.5"/>
  <text x="285" y="304" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">Redis Queue</text>
  <text x="285" y="320" text-anchor="middle" font-size="9" fill="#444">Upstash</text>
  <text x="285" y="334" text-anchor="middle" font-size="9" fill="#444">Job tracking (BullMQ)</text>

  <!-- Cloudflare R2 -->
  <rect x="380" y="280" width="150" height="60" rx="4" fill="#d9d9d9" stroke="#333" stroke-width="1.5"/>
  <text x="455" y="304" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">Object Storage</text>
  <text x="455" y="320" text-anchor="middle" font-size="9" fill="#444">Cloudflare R2</text>
  <text x="455" y="334" text-anchor="middle" font-size="9" fill="#444">Chapter MP3 files</text>

  <!-- Gemini API -->
  <rect x="550" y="280" width="150" height="60" rx="4" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
  <text x="625" y="304" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">Gemini 2.5 Flash</text>
  <text x="625" y="320" text-anchor="middle" font-size="9" fill="#444">Google AI Studio</text>
  <text x="625" y="334" text-anchor="middle" font-size="9" fill="#444">Dialog attribution (LLM)</text>

  <!-- Edge TTS -->
  <rect x="720" y="280" width="100" height="60" rx="4" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
  <text x="770" y="304" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">Edge TTS</text>
  <text x="770" y="320" text-anchor="middle" font-size="9" fill="#444">Microsoft</text>
  <text x="770" y="334" text-anchor="middle" font-size="9" fill="#444">TTS synthesis</text>

  <!-- Connector lines: FastAPI ↔ each service -->
  <!-- to PostgreSQL -->
  <line x1="350" y1="216" x2="115" y2="280" stroke="#888" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arrDash)"/>
  <!-- to Redis -->
  <line x1="370" y1="216" x2="285" y2="280" stroke="#888" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arrDash)"/>
  <!-- to R2 -->
  <line x1="430" y1="216" x2="455" y2="280" stroke="#888" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arrDash)"/>
  <!-- to Gemini -->
  <line x1="490" y1="216" x2="625" y2="280" stroke="#888" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arrDash)"/>
  <!-- to Edge TTS -->
  <line x1="510" y1="216" x2="770" y2="280" stroke="#888" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arrDash)"/>

  <!-- Supabase Auth note (below PostgreSQL) -->
  <rect x="40" y="360" width="150" height="40" rx="4" fill="#f0f0f0" stroke="#333" stroke-width="1.2"/>
  <text x="115" y="377" text-anchor="middle" font-size="10" font-weight="bold" fill="#000">Supabase Auth</text>
  <text x="115" y="392" text-anchor="middle" font-size="9" fill="#444">JWT / JWKS / OAuth</text>

  <!-- Connector: Supabase Auth ↔ PostgreSQL -->
  <line x1="115" y1="360" x2="115" y2="340" stroke="#555" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- ══════════════════════════════════════════════════════
       LEGEND
  ══════════════════════════════════════════════════════ -->
  <rect x="690" y="360" width="150" height="78" rx="4" fill="#ffffff" stroke="#333" stroke-width="1"/>
  <text x="765" y="378" text-anchor="middle" font-size="10" font-weight="bold" fill="#000">Legend</text>

  <rect x="702" y="388" width="14" height="10" rx="2" fill="#f0f0f0" stroke="#333" stroke-width="1"/>
  <text x="722" y="398" font-size="9" fill="#000">Processing / Logic</text>

  <rect x="702" y="408" width="14" height="10" rx="2" fill="#d9d9d9" stroke="#333" stroke-width="1"/>
  <text x="722" y="418" font-size="9" fill="#000">Data / Storage</text>

  <line x1="702" y1="428" x2="716" y2="428" stroke="#888" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="722" y="432" font-size="9" fill="#000">Service call</text>

  <!-- Defs -->
  <defs>
    <marker id="arr2" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#333"/>
    </marker>
    <marker id="arrS" markerWidth="7" markerHeight="7" refX="1" refY="3" orient="auto">
      <path d="M7,0 L7,6 L0,3 z" fill="#333"/>
    </marker>
    <marker id="arrDash" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#888"/>
    </marker>
  </defs>

</svg>
