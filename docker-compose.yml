services:
  postgres:
    image: postgres:16-alpine
    container_name: noveltts-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-noveltts}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-noveltts_dev}
      POSTGRES_DB: ${POSTGRES_DB:-noveltts}
    ports:
      - "6543:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-noveltts} -d ${POSTGRES_DB:-noveltts}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: noveltts-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: noveltts-backend:dev
    container_name: noveltts-backend
    working_dir: /app
    volumes:
      - ./backend:/app
    command: >
      sh -c "uv sync &&
             uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://noveltts:noveltts_dev@postgres:5432/noveltts}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      APP_NAME: ${APP_NAME:-NovelTTS Backend}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      UV_PROJECT_ENVIRONMENT: /tmp/noveltts-venv
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      KOKORO_DEVICE: ${KOKORO_DEVICE:-cpu}
      EDGE_TTS_DEFAULT_VOICE: ${EDGE_TTS_DEFAULT_VOICE:-en-US-AriaNeural}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    image: node:20-alpine
    container_name: noveltts-worker
    working_dir: /app
    volumes:
      - ./worker:/app
    command: sh -c "corepack enable && pnpm install && pnpm dev"
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
